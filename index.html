<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de facturas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --ink:#1f2421;
    --paper:#fbf9f4;
    --line:#d8d2c4;
    --accent:#b5562d;
    --accent-soft:#f1e1d6;
    --muted:#7c7567;
    --mono: "JetBrains Mono", "Courier New", monospace;
    --serif: "Georgia", "Times New Roman", serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family: var(--serif);
    line-height:1.5;
    padding:32px 16px 80px;
  }
  .wrap{max-width:760px;margin:0 auto;}
  header{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    border-bottom:2px solid var(--ink);
    padding-bottom:14px;
    margin-bottom:28px;
    gap:16px;
  }
  header .brand{
    display:flex;
    align-items:center;
    gap:14px;
  }
  header .brand img{
    height:56px;
    width:auto;
    display:block;
  }
  header h1{
    font-size:1.5rem;
    letter-spacing:0.08em;
    text-transform:uppercase;
    margin:0;
    font-weight:600;
  }
  header .num{
    font-family:var(--mono);
    font-size:0.85rem;
    color:var(--muted);
    text-align:right;
    flex-shrink:0;
  }
  @media (max-width:480px){
    header .brand img{height:40px;}
    header h1{font-size:1.2rem;}
  }
  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:24px;
    margin-bottom:28px;
  }
  @media (max-width:560px){
    .grid{grid-template-columns:1fr;}
  }
  fieldset{
    border:1px solid var(--line);
    border-radius:4px;
    padding:14px 16px 16px;
  }
  legend{
    font-family:var(--mono);
    font-size:0.7rem;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--accent);
    padding:0 6px;
  }
  label{
    display:block;
    font-family:var(--mono);
    font-size:0.7rem;
    letter-spacing:0.05em;
    color:var(--muted);
    margin:10px 0 4px;
  }
  label:first-of-type{margin-top:0;}
  input, textarea{
    width:100%;
    font-family:var(--serif);
    font-size:0.95rem;
    padding:7px 8px;
    border:1px solid var(--line);
    border-radius:3px;
    background:#fff;
    color:var(--ink);
  }
  input:focus, textarea:focus{
    outline:2px solid var(--accent);
    outline-offset:1px;
  }
  textarea{resize:vertical;min-height:48px;}

  table{
    width:100%;
    border-collapse:collapse;
    margin-bottom:10px;
  }
  th{
    font-family:var(--mono);
    font-size:0.68rem;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--muted);
    text-align:left;
    padding:6px 6px;
    border-bottom:1px solid var(--ink);
  }
  th.num, td.num{text-align:right;}
  td{padding:6px 6px;border-bottom:1px solid var(--line);}
  td input{border:none;background:transparent;padding:4px 4px;}
  td input:focus{outline:1px solid var(--accent);background:#fff;}
  .col-desc{width:42%;}
  .col-qty{width:14%;}
  .col-price{width:20%;}
  .col-total{width:18%;}
  .col-del{width:6%;text-align:center;}
  .del-btn{
    background:none;border:none;color:var(--muted);
    cursor:pointer;font-size:1rem;line-height:1;padding:2px 4px;
  }
  .del-btn:hover{color:var(--accent);}
  .add-row{
    font-family:var(--mono);
    font-size:0.75rem;
    letter-spacing:0.05em;
    background:none;
    border:1px dashed var(--line);
    border-radius:3px;
    padding:8px 14px;
    color:var(--accent);
    cursor:pointer;
    width:100%;
  }
  .add-row:hover{border-color:var(--accent);background:var(--accent-soft);}

  .totals{
    display:flex;
    justify-content:flex-end;
    margin-top:18px;
  }
  .totals-box{
    width:240px;
    border-top:2px solid var(--ink);
    padding-top:10px;
  }
  .totals-box .row{
    display:flex;justify-content:space-between;
    font-family:var(--mono);font-size:0.95rem;
    padding:4px 0;
  }
  .totals-box .row.grand{
    font-size:1.2rem;font-weight:700;
    border-top:1px solid var(--line);
    margin-top:6px;padding-top:8px;
  }

  .notes-section{margin-top:28px;}

  .actions{
    margin-top:32px;
    display:flex;
    gap:12px;
    flex-wrap:wrap;
  }
  button.primary{
    font-family:var(--mono);
    letter-spacing:0.08em;
    text-transform:uppercase;
    font-size:0.8rem;
    background:var(--ink);
    color:var(--paper);
    border:none;
    padding:13px 28px;
    border-radius:3px;
    cursor:pointer;
  }
  button.primary:hover{background:var(--accent);}
  button.secondary{
    font-family:var(--mono);
    letter-spacing:0.08em;
    text-transform:uppercase;
    font-size:0.8rem;
    background:none;
    color:var(--ink);
    border:1px solid var(--ink);
    padding:13px 28px;
    border-radius:3px;
    cursor:pointer;
  }
  button.secondary:hover{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);}

  .hint{
    font-family:var(--mono);
    font-size:0.7rem;
    color:var(--muted);
    margin-top:8px;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <img id="logoImg" src="" alt="Logo del negocio">
      <h1>Factura</h1>
    </div>
    <div class="num">
      <div>N.º <input id="invNumber" value="0001" style="width:70px;text-align:right;border:none;background:transparent;font-family:var(--mono);font-size:0.85rem;color:var(--ink);padding:0;"></div>
      <div style="margin-top:4px;">Fecha <input id="invDate" type="date" style="border:none;background:transparent;font-family:var(--mono);font-size:0.85rem;color:var(--ink);padding:0;"></div>
    </div>
  </header>

  <div class="grid">
    <fieldset>
      <legend>Tu negocio</legend>
      <label for="bizName">Nombre del negocio</label>
      <input id="bizName" placeholder="Mi Tienda S.A.">
      <label for="bizAddr">Dirección</label>
      <textarea id="bizAddr" placeholder="Calle, ciudad, país"></textarea>
      <label for="bizContact">Teléfono / correo</label>
      <input id="bizContact" placeholder="+00 000 000 000 · correo@tienda.com">
    </fieldset>

    <fieldset>
      <legend>Facturar a</legend>
      <label for="cliName">Nombre del cliente</label>
      <input id="cliName" placeholder="Nombre del cliente">
      <label for="cliAddr">Dirección</label>
      <textarea id="cliAddr" placeholder="Calle, ciudad, país"></textarea>
      <label for="cliContact">Teléfono / correo</label>
      <input id="cliContact" placeholder="+00 000 000 000 · correo@cliente.com">
    </fieldset>
  </div>

  <table id="itemsTable">
    <thead>
      <tr>
        <th class="col-desc">Producto</th>
        <th class="col-qty num">Cant.</th>
        <th class="col-price num">Precio</th>
        <th class="col-total num">Total</th>
        <th class="col-del"></th>
      </tr>
    </thead>
    <tbody id="itemsBody"></tbody>
  </table>
  <button class="add-row" id="addRow">+ Añadir producto</button>

  <div class="totals">
    <div class="totals-box">
      <div class="row"><span>Subtotal</span><span id="subtotal">$0.00</span></div>
      <div class="row grand"><span>Total</span><span id="grandTotal">$0.00</span></div>
    </div>
  </div>

  <div class="notes-section">
    <label for="notes">Notas / condiciones de pago</label>
    <textarea id="notes" placeholder="Ej: Pago dentro de 15 días. Gracias por su compra."></textarea>
  </div>

  <div class="actions">
    <button class="primary" id="downloadPdf">Descargar PDF</button>
    <button class="secondary" id="resetForm">Limpiar formulario</button>
  </div>
  <p class="hint">Los datos no se guardan: descarga el PDF antes de cerrar esta página.</p>

</div>

const itemsBody = document.getElementById('itemsBody');
const currency = v => '$' + (isNaN(v) ? 0 : v).toFixed(2);

function createRow(desc='', qty=1, price=0){
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td class="col-desc"><input class="f-desc" value="${desc}" placeholder="Descripción del producto"></td>
    <td class="col-qty num"><input class="f-qty" type="number" min="0" step="1" value="${qty}"></td>
    <td class="col-price num"><input class="f-price" type="number" min="0" step="0.01" value="${price}"></td>
    <td class="col-total num f-line-total">${currency(qty*price)}</td>
    <td class="col-del"><button class="del-btn" title="Eliminar fila">×</button></td>
  `;
  tr.querySelectorAll('input').forEach(inp => inp.addEventListener('input', updateTotals));
  tr.querySelector('.del-btn').addEventListener('click', () => { tr.remove(); updateTotals(); });
  itemsBody.appendChild(tr);
}

function updateTotals(){
  let subtotal = 0;
  itemsBody.querySelectorAll('tr').forEach(tr => {
    const qty = parseFloat(tr.querySelector('.f-qty').value) || 0;
    const price = parseFloat(tr.querySelector('.f-price').value) || 0;
    const lineTotal = qty * price;
    tr.querySelector('.f-line-total').textContent = currency(lineTotal);
    subtotal += lineTotal;
  });
  document.getElementById('subtotal').textContent = currency(subtotal);
  document.getElementById('grandTotal').textContent = currency(subtotal);
}

document.getElementById('addRow').addEventListener('click', () => createRow());

// Initial rows
createRow('', 1, 0);
createRow('', 1, 0);
createRow('', 1, 0);

// Default date = today
document.getElementById('invDate').valueAsDate = new Date();
document.getElementById('logoImg').src = LOGO_DATA;

document.getElementById('resetForm').addEventListener('click', () => {
  if(!confirm('¿Borrar todos los datos del formulario?')) return;
  document.querySelectorAll('input[type=text], input:not([type]), textarea').forEach(el => {
    if(el.id !== 'invNumber') el.value = '';
  });
  document.getElementById('invDate').valueAsDate = new Date();
  itemsBody.innerHTML = '';
  createRow('', 1, 0);
  createRow('', 1, 0);
  createRow('', 1, 0);
  updateTotals();
});

document.getElementById('downloadPdf').addEventListener('click', () => {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'pt', format: 'a4' });
  const pageWidth = doc.internal.pageSize.getWidth();
  const margin = 48;
  let y = 60;

  const bizName = document.getElementById('bizName').value || 'Tu negocio';
  const bizAddr = document.getElementById('bizAddr').value;
  const bizContact = document.getElementById('bizContact').value;
  const cliName = document.getElementById('cliName').value || 'Cliente';
  const cliAddr = document.getElementById('cliAddr').value;
  const cliContact = document.getElementById('cliContact').value;
  const invNumber = document.getElementById('invNumber').value;
  const invDate = document.getElementById('invDate').value;
  const notes = document.getElementById('notes').value;

  // Header
  doc.setFont('times', 'bold');
  doc.setFontSize(22);
  doc.text('FACTURA', margin, y);

  // Logo (top right)
  let logoH = 0;
  try {
    const logoMaxW = 110;
    const logoMaxH = 50;
    const imgProps = doc.getImageProperties(LOGO_DATA);
    let w = imgProps.width;
    let h = imgProps.height;
    const ratio = Math.min(logoMaxW / w, logoMaxH / h);
    w = w * ratio;
    h = h * ratio;
    logoH = h;
    doc.addImage(LOGO_DATA, 'PNG', pageWidth - margin - w, 30, w, h);
  } catch (e) {
    console.warn('No se pudo añadir el logo al PDF', e);
  }

  doc.setFont('courier', 'normal');
  doc.setFontSize(10);
  const metaY = Math.max(y - 14, 30 + logoH + 16);
  doc.text(`N.º ${invNumber}`, pageWidth - margin, metaY, { align: 'right' });
  doc.text(`Fecha: ${invDate}`, pageWidth - margin, metaY + 14, { align: 'right' });

  y = Math.max(y + 10, 30 + logoH + 10);
  doc.setDrawColor(31, 36, 33);
  doc.setLineWidth(1.2);
  doc.line(margin, y, pageWidth - margin, y);
  y += 28;

  // Business / client columns
  const colWidth = (pageWidth - margin*2 - 24) / 2;

  doc.setFont('courier', 'normal');
  doc.setFontSize(8);
  doc.setTextColor(120, 117, 103);
  doc.text('TU NEGOCIO', margin, y);
  doc.text('FACTURAR A', margin + colWidth + 24, y);

  doc.setTextColor(31, 36, 33);
  doc.setFont('times', 'bold');
  doc.setFontSize(12);
  doc.text(bizName, margin, y + 16);
  doc.text(cliName, margin + colWidth + 24, y + 16);

  doc.setFont('times', 'normal');
  doc.setFontSize(10);
  let bizLines = [];
  if(bizAddr) bizLines = bizLines.concat(doc.splitTextToSize(bizAddr, colWidth));
  if(bizContact) bizLines = bizLines.concat(doc.splitTextToSize(bizContact, colWidth));
  let cliLines = [];
  if(cliAddr) cliLines = cliLines.concat(doc.splitTextToSize(cliAddr, colWidth));
  if(cliContact) cliLines = cliLines.concat(doc.splitTextToSize(cliContact, colWidth));

  doc.text(bizLines, margin, y + 32);
  doc.text(cliLines, margin + colWidth + 24, y + 32);

  const maxLines = Math.max(bizLines.length, cliLines.length, 1);
  y += 32 + maxLines * 13 + 26;

  // Table header
  const colDesc = margin;
  const colQty = pageWidth - margin - 220;
  const colPrice = pageWidth - margin - 140;
  const colTotal = pageWidth - margin;

  doc.setFont('courier', 'normal');
  doc.setFontSize(8);
  doc.setTextColor(120, 117, 103);
  doc.text('PRODUCTO', colDesc, y);
  doc.text('CANT.', colQty, y, { align: 'right' });
  doc.text('PRECIO', colPrice, y, { align: 'right' });
  doc.text('TOTAL', colTotal, y, { align: 'right' });

  y += 6;
  doc.setDrawColor(31, 36, 33);
  doc.setLineWidth(1);
  doc.line(margin, y, pageWidth - margin, y);
  y += 16;

  // Table rows
  doc.setTextColor(31, 36, 33);
  doc.setFont('times', 'normal');
  doc.setFontSize(10);

  let subtotal = 0;
  itemsBody.querySelectorAll('tr').forEach(tr => {
    const desc = tr.querySelector('.f-desc').value || '';
    const qty = parseFloat(tr.querySelector('.f-qty').value) || 0;
    const price = parseFloat(tr.querySelector('.f-price').value) || 0;
    const lineTotal = qty * price;
    subtotal += lineTotal;

    if(!desc && qty === 0 && price === 0) return; // skip empty rows

    if(y > 720){ doc.addPage(); y = 60; }

    const descLines = doc.splitTextToSize(desc || '—', colQty - colDesc - 10);
    doc.text(descLines, colDesc, y);
    doc.text(String(qty), colQty, y, { align: 'right' });
    doc.text('$' + price.toFixed(2), colPrice, y, { align: 'right' });
    doc.text('$' + lineTotal.toFixed(2), colTotal, y, { align: 'right' });

    y += Math.max(descLines.length * 13, 16);
    doc.setDrawColor(216, 210, 196);
    doc.setLineWidth(0.5);
    doc.line(margin, y - 4, pageWidth - margin, y - 4);
  });

  y += 16;

  // Totals
  doc.setDrawColor(31, 36, 33);
  doc.setLineWidth(1.2);
  doc.line(colPrice - 60, y, pageWidth - margin, y);
  y += 18;

  doc.setFont('times', 'bold');
  doc.setFontSize(13);
  doc.text('TOTAL', colPrice, y, { align: 'right' });
  doc.text('$' + subtotal.toFixed(2), colTotal, y, { align: 'right' });

  y += 40;

  // Notes
  if(notes){
    if(y > 700){ doc.addPage(); y = 60; }
    doc.setFont('courier', 'normal');
    doc.setFontSize(8);
    doc.setTextColor(120, 117, 103);
    doc.text('NOTAS', margin, y);
    y += 14;
    doc.setFont('times', 'normal');
    doc.setFontSize(10);
    doc.setTextColor(31, 36, 33);
    const noteLines = doc.splitTextToSize(notes, pageWidth - margin*2);
    doc.text(noteLines, margin, y);
  }

  const filename = `factura-${invNumber || '0001'}.pdf`;
  doc.save(filename);
});

updateTotals();
</script>
</body>
</html>
